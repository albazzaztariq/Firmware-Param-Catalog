<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intel FSP Parameter Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e17;--bg-panel:#111827;--bg-card:#1a2234;--bg-card-hover:#1e2a40;
  --border:#2a3550;--text:#e2e8f0;--text-dim:#8892a8;--text-bright:#f1f5f9;
  --accent:#3b82f6;--accent-dim:#1e40af;--green:#22c55e;--amber:#f59e0b;
  --red:#ef4444;--purple:#a78bfa;--cyan:#22d3ee;--sidebar-w:300px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow:hidden;height:100vh}
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:margin-left .3s}
.sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w))}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.sidebar-header .subtitle{font-size:11px;color:var(--text-dim)}
.sidebar-header .total{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);margin-top:6px}

.platform-select{padding:10px 12px;border-bottom:1px solid var(--border)}
.platform-select select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:12px;font-family:'DM Sans',system-ui;cursor:pointer;outline:none}
.platform-select select:focus{border-color:var(--accent)}
.platform-select option{background:var(--bg-panel);color:var(--text)}
.platform-meta{font-size:11px;color:var(--text-dim);margin-top:6px;line-height:1.4}
.platform-meta .seg{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;padding:1px 6px;border-radius:3px;margin-right:4px}
.seg-Server{background:rgba(239,68,68,.15);color:var(--red)}
.seg-Client{background:rgba(59,130,246,.15);color:var(--accent)}
.seg-Embedded{background:rgba(245,158,11,.15);color:var(--amber)}

.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-track{background:transparent}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.nav-section{padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-dim);transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg-card);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
.nav-item .count{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);padding:1px 6px;border-radius:3px;color:var(--text-dim)}
.nav-item.active .count{background:rgba(59,130,246,.2);color:var(--accent)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg-panel);flex-shrink:0}
.toggle-btn{background:none;border:1px solid var(--border);color:var(--text-dim);width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
.search-box{flex:1;max-width:480px;position:relative}
.search-box input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px 8px 36px;border-radius:6px;font-size:13px;font-family:'DM Sans',system-ui;outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text-dim)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;pointer-events:none}
.topbar-stats{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);white-space:nowrap}
.topbar-stats strong{color:var(--accent)}

.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.category-header{font-size:18px;font-weight:700;color:var(--text-bright);margin:20px 0 12px;display:flex;align-items:center;gap:10px}
.category-header:first-child{margin-top:0}
.category-header .badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--accent-dim);color:var(--accent);padding:2px 8px;border-radius:3px}

.param-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color .15s,background .15s;overflow:hidden}
.param-card:hover{border-color:var(--accent);background:var(--bg-card-hover)}
.param-header{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px;cursor:pointer;gap:12px}
.param-title-area{flex:1;min-width:0}
.param-name{font-weight:700;font-size:13px;color:var(--text-bright);margin-bottom:1px}
.param-field{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--purple)}
.param-meta{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.param-type{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg);color:var(--cyan);padding:2px 6px;border-radius:3px;white-space:nowrap}
.param-offset{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);white-space:nowrap}
.param-default-chip{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(34,197,94,.15);color:var(--green);padding:2px 6px;border-radius:3px;white-space:nowrap}
.expand-icon{color:var(--text-dim);font-size:11px;transition:transform .2s;flex-shrink:0;margin-top:3px}
.param-card.expanded .expand-icon{transform:rotate(90deg)}
.param-body{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
.param-card.expanded .param-body{display:block;padding-top:10px}
.param-desc{font-size:12px;color:var(--text-dim);margin-bottom:8px;line-height:1.5}
.param-options{display:flex;flex-wrap:wrap;gap:5px}
.option-chip{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg);border:1px solid var(--border);color:var(--text-dim);padding:2px 7px;border-radius:4px}
.option-chip.is-default{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.08)}
.phase-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--amber);margin-top:6px;opacity:.7}

/* Deep-link highlight pulse */
@keyframes param-highlight {
  0%  { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,.4); background:var(--bg-card-hover); }
  60% { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,.2); background:var(--bg-card-hover); }
  100%{ border-color:var(--border); box-shadow:none;                           background:var(--bg-card); }
}
.param-card.flash { animation: param-highlight 2s ease-out forwards; }

.loading{text-align:center;padding:60px 20px;color:var(--text-dim)}
.loading .spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.no-results{text-align:center;padding:60px 20px;color:var(--text-dim)}
.no-results .big{font-size:48px;margin-bottom:12px}

/* Landing page */
.landing{padding:40px;max-width:900px}
.landing h2{font-size:24px;color:var(--text-bright);margin-bottom:8px}
.landing .lead{color:var(--text-dim);margin-bottom:24px;font-size:14px}
.platform-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.platform-tile{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;transition:all .15s}
.platform-tile:hover{border-color:var(--accent);background:var(--bg-card-hover);transform:translateY(-1px)}
.platform-tile .name{font-weight:700;font-size:14px;color:var(--text-bright);margin-bottom:4px}
.platform-tile .proc{font-size:12px;color:var(--text-dim);margin-bottom:8px}
.platform-tile .meta{display:flex;justify-content:space-between;align-items:center}
.platform-tile .param-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)}

@media(max-width:768px){
  .sidebar{position:fixed;z-index:100;height:100vh}
  .sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w))}
  .content{padding:16px}
  .topbar{padding:10px 16px}
  .platform-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>FSP Catalog</h1>
      <div class="subtitle">Intel Firmware Support Package · Parameter Reference</div>
      <div class="total" id="totalBadge">18 platforms · 37,388 parameters</div>
    </div>
    <div class="platform-select">
      <select id="platformSelect"><option value="">Select platform...</option></select>
      <div class="platform-meta" id="platformMeta"></div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="toggle-btn" id="toggleBtn" title="Toggle sidebar">☰</button>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search parameters...">
      </div>
      <div class="topbar-stats" id="stats"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<script>
const INDEX = [{"pkg_name":"AlderLakeFspBinPkg","platform":"AlderLake","processor":"12th Generation Intel Core (Alder Lake)","segment":"Client","fsp_spec_version":"2.3","total_parameters":10175,"categories":{"IIO / PCIe Configuration":1429,"Memory Configuration":1643,"Debug / Diagnostic":573,"Other":3412,"Peripheral / IO":1350,"Power Management":754,"CPU Configuration":203,"Graphics / Display":441,"Security":161,"UPI / Interconnect / Uncore":195,"Platform / Boot":14},"source":"https://github.com/intel/FSP/tree/master/AlderLakeFspBinPkg"},{"pkg_name":"AmberLakeFspBinPkg","platform":"AmberLake","processor":"10th/8th/7th Gen Intel Core (Amber Lake, Kaby Lake Refresh)","segment":"Client","fsp_spec_version":"2.1","total_parameters":750,"categories":{"IIO / PCIe Configuration":98,"Memory Configuration":59,"Other":264,"Debug / Diagnostic":24,"Peripheral / IO":142,"Graphics / Display":37,"Power Management":85,"Security":15,"CPU Configuration":16,"UPI / Interconnect / Uncore":9,"Platform / Boot":1},"source":"https://github.com/intel/FSP/tree/master/AmberLakeFspBinPkg"},{"pkg_name":"ApolloLakeFspBinPkg","platform":"ApolloLake","processor":"Intel Atom E3900 (Apollo Lake)","segment":"Embedded","fsp_spec_version":"2.0","total_parameters":364,"categories":{"Memory Configuration":41,"Debug / Diagnostic":10,"Graphics / Display":17,"Other":144,"Peripheral / IO":80,"IIO / PCIe Configuration":27,"CPU Configuration":6,"Security":2,"Power Management":21,"UPI / Interconnect / Uncore":15,"Platform / Boot":1},"source":"https://github.com/intel/FSP/tree/master/ApolloLakeFspBinPkg"},{"pkg_name":"ArrowLakeFspBinPkg","platform":"ArrowLake","processor":"Intel Core Ultra (Arrow Lake)","segment":"Client","fsp_spec_version":"2.4","total_parameters":3285,"categories":{"IIO / PCIe Configuration":526,"Memory Configuration":536,"Debug / Diagnostic":188,"Other":1069,"Peripheral / IO":390,"CPU Configuration":86,"Graphics / Display":166,"Security":54,"Power Management":198,"UPI / Interconnect / Uncore":64,"Platform / Boot":8},"source":"https://github.com/intel/FSP/tree/master/ArrowLakeFspBinPkg"},{"pkg_name":"BartlettLakeFspBinPkg","platform":"BartlettLake","processor":"Intel Core (Bartlett Lake)","segment":"Client","fsp_spec_version":"2.4","total_parameters":1465,"categories":{"IIO / PCIe Configuration":206,"Memory Configuration":239,"Debug / Diagnostic":85,"Other":494,"Peripheral / IO":185,"Power Management":110,"CPU Configuration":29,"Graphics / Display":64,"Security":23,"UPI / Interconnect / Uncore":28,"Platform / Boot":2},"source":"https://github.com/intel/FSP/tree/master/BartlettLakeFspBinPkg"},{"pkg_name":"CedarIslandFspBinPkg","platform":"CedarIsland","processor":"3rd Gen Intel Xeon Scalable (Cooper Lake)","segment":"Server","fsp_spec_version":"2.1","total_parameters":118,"categories":{"Debug / Diagnostic":3,"Platform / Boot":5,"UPI / Interconnect / Uncore":38,"IIO / PCIe Configuration":49,"Memory Configuration":6,"Other":6,"Peripheral / IO":7,"Security":2,"CPU Configuration":2},"source":"https://github.com/intel/FSP/tree/master/CedarIslandFspBinPkg"},{"pkg_name":"CoffeeLakeFspBinPkg","platform":"CoffeeLake","processor":"9th/8th Gen Intel Core (Coffee Lake, Whiskey Lake)","segment":"Client","fsp_spec_version":"2.0","total_parameters":1013,"categories":{"IIO / PCIe Configuration":107,"Memory Configuration":154,"Other":352,"Debug / Diagnostic":30,"Peripheral / IO":170,"Graphics / Display":49,"Power Management":99,"Security":20,"CPU Configuration":19,"UPI / Interconnect / Uncore":12,"Platform / Boot":1},"source":"https://github.com/intel/FSP/tree/master/CoffeeLakeFspBinPkg"},{"pkg_name":"CometLakeFspBinPkg","platform":"CometLake","processor":"10th Gen Intel Core (Comet Lake)","segment":"Client","fsp_spec_version":"2.1","total_parameters":4347,"categories":{"IIO / PCIe Configuration":504,"Memory Configuration":646,"Debug / Diagnostic":158,"Other":1433,"Graphics / Display":192,"Power Management":394,"Security":82,"Peripheral / IO":731,"CPU Configuration":140,"UPI / Interconnect / Uncore":63,"Platform / Boot":4},"source":"https://github.com/intel/FSP/tree/master/CometLakeFspBinPkg"},{"pkg_name":"DenvertonNSFspBinPkg","platform":"DenvertonNS","processor":"Intel Atom C3XXX (Denverton)","segment":"Embedded","fsp_spec_version":"2.0","total_parameters":81,"categories":{"Debug / Diagnostic":1,"Security":1,"Memory Configuration":16,"Peripheral / IO":15,"Other":10,"Platform / Boot":1,"IIO / PCIe Configuration":36,"CPU Configuration":1},"source":"https://github.com/intel/FSP/tree/master/DenvertonNSFspBinPkg"},{"pkg_name":"EagleStreamFspBinPkg","platform":"EagleStream","processor":"4th Gen Intel Xeon Scalable (Sapphire Rapids)","segment":"Server","fsp_spec_version":"2.3","total_parameters":231,"categories":{"Debug / Diagnostic":7,"Platform / Boot":6,"UPI / Interconnect / Uncore":39,"IIO / PCIe Configuration":31,"Memory Configuration":82,"Other":21,"Peripheral / IO":4,"Security":24,"CPU Configuration":9,"CXL Configuration":3,"Power Management":4,"Graphics / Display":1},"source":"https://github.com/intel/FSP/tree/master/EagleStreamFspBinPkg"},{"pkg_name":"ElkhartLakeFspBinPkg","platform":"ElkhartLake","processor":"Intel Atom x6000E, Pentium/Celeron N/J (Elkhart Lake)","segment":"Embedded","fsp_spec_version":"2.1","total_parameters":1303,"categories":{"IIO / PCIe Configuration":191,"Memory Configuration":172,"Debug / Diagnostic":48,"Other":425,"Peripheral / IO":220,"Graphics / Display":58,"CPU Configuration":19,"Power Management":102,"Security":16,"Platform / Boot":2,"UPI / Interconnect / Uncore":50},"source":"https://github.com/intel/FSP/tree/master/ElkhartLakeFspBinPkg"},{"pkg_name":"IceLakeFspBinPkg","platform":"IceLake","processor":"10th Gen Intel Core (Ice Lake)","segment":"Client","fsp_spec_version":"2.1","total_parameters":1077,"categories":{"Memory Configuration":146,"IIO / PCIe Configuration":137,"Debug / Diagnostic":40,"Other":368,"Security":19,"Power Management":98,"CPU Configuration":23,"Graphics / Display":46,"Peripheral / IO":176,"UPI / Interconnect / Uncore":24},"source":"https://github.com/intel/FSP/tree/master/IceLakeFspBinPkg"},{"pkg_name":"IdavilleFspBinPkg","platform":"Idaville","processor":"Intel Xeon D-1700/D-2700 (Ice Lake-D)","segment":"Server","fsp_spec_version":"2.1","total_parameters":572,"categories":{"Memory Configuration":58,"Graphics / Display":40,"Other":98,"Peripheral / IO":48,"Security":24,"IIO / PCIe Configuration":246,"Power Management":38,"Platform / Boot":2,"Debug / Diagnostic":8,"CPU Configuration":8,"UPI / Interconnect / Uncore":2},"source":"https://github.com/intel/FSP/tree/master/IdavilleFspBinPkg"},{"pkg_name":"KabylakeFspBinPkg","platform":"Kabylake","processor":"7th Gen Intel Core (Kaby Lake)","segment":"Client","fsp_spec_version":"2.0","total_parameters":748,"categories":{"IIO / PCIe Configuration":98,"Memory Configuration":59,"Other":262,"Debug / Diagnostic":24,"Peripheral / IO":142,"Graphics / Display":37,"Power Management":85,"Security":15,"CPU Configuration":16,"UPI / Interconnect / Uncore":9,"Platform / Boot":1},"source":"https://github.com/intel/FSP/tree/master/KabylakeFspBinPkg"},{"pkg_name":"MeteorLakeFspBinPkg","platform":"MeteorLake","processor":"Intel Core Ultra (Meteor Lake)","segment":"Client","fsp_spec_version":"2.4","total_parameters":1644,"categories":{"IIO / PCIe Configuration":263,"Memory Configuration":270,"Debug / Diagnostic":94,"Other":534,"Peripheral / IO":195,"CPU Configuration":43,"Graphics / Display":83,"Security":27,"Power Management":99,"UPI / Interconnect / Uncore":32,"Platform / Boot":4},"source":"https://github.com/intel/FSP/tree/master/MeteorLakeFspBinPkg"},{"pkg_name":"RaptorLakeFspBinPkg","platform":"RaptorLake","processor":"12th/13th/14th Gen Intel Core (Alder Lake, Raptor Lake)","segment":"Client","fsp_spec_version":"2.3","total_parameters":7187,"categories":{"IIO / PCIe Configuration":1020,"Memory Configuration":1173,"Debug / Diagnostic":393,"Other":2416,"Peripheral / IO":913,"Power Management":550,"CPU Configuration":145,"Graphics / Display":314,"Security":115,"UPI / Interconnect / Uncore":138,"Platform / Boot":10},"source":"https://github.com/intel/FSP/tree/master/RaptorLakeFspBinPkg"},{"pkg_name":"TigerLakeFspBinPkg","platform":"TigerLake","processor":"11th Gen Intel Core (Tiger Lake)","segment":"Client","fsp_spec_version":"2.2","total_parameters":2910,"categories":{"IIO / PCIe Configuration":469,"Memory Configuration":424,"Debug / Diagnostic":128,"Other":951,"Peripheral / IO":391,"Power Management":205,"CPU Configuration":65,"Graphics / Display":148,"Security":69,"Platform / Boot":6,"UPI / Interconnect / Uncore":54},"source":"https://github.com/intel/FSP/tree/master/TigerLakeFspBinPkg"},{"pkg_name":"WhitleyFspBinPkg","platform":"Whitley","processor":"3rd Gen Intel Xeon Scalable (Ice Lake-SP)","segment":"Server","fsp_spec_version":"2.1","total_parameters":118,"categories":{"Debug / Diagnostic":3,"Platform / Boot":5,"UPI / Interconnect / Uncore":38,"IIO / PCIe Configuration":49,"Memory Configuration":6,"Other":6,"Peripheral / IO":7,"Security":2,"CPU Configuration":2},"source":"https://github.com/intel/FSP/tree/master/WhitleyFspBinPkg"}];

let currentPlatform = null;
let platformData    = null;
let activeCategory  = 'all';
let searchQuery     = '';
let expandedCards   = new Set();

// ── Hash routing ─────────────────────────────────────────────────────────────
//
// Rules:
//   push=true  → history.pushState  (user navigated: creates a back-button entry)
//   push=false → history.replaceState (popstate / init: we ARE that entry already)
//
// URL formats:
//   (empty)                    → landing page
//   #EagleStreamFspBinPkg      → platform view
//   #EagleStreamFspBinPkg/SncEn → platform view, SncEn expanded + highlighted

function setHash(hash, push) {
  const url = hash ? '#' + hash : location.pathname + location.search;
  if (push) history.pushState(null, '', url);
  else      history.replaceState(null, '', url);
}

function routeFromHash(push) {
  const raw = decodeURIComponent(location.hash.slice(1));
  if (!raw) { showLanding(); return; }
  const slash = raw.indexOf('/');
  const pkg   = slash === -1 ? raw       : raw.slice(0, slash);
  const field = slash === -1 ? null      : raw.slice(slash + 1);
  const match = INDEX.find(p => p.pkg_name === pkg || p.platform === pkg);
  if (match) loadPlatform(match.pkg_name, field, push);
  else       showLanding();
}

window.addEventListener('popstate', () => routeFromHash(false));

// ── Init ─────────────────────────────────────────────────────────────────────

function init() {
  buildPlatformSelect();
  setupEvents();
  routeFromHash(false);   // initial page load — we're already at this URL
}

// ── Landing ───────────────────────────────────────────────────────────────────

function showLanding() {
  setHash('', false);   // clear hash; always replaceState (we don't want a history entry for "landing")
  currentPlatform = null;
  platformData    = null;
  document.getElementById('platformSelect').value = '';
  document.getElementById('platformMeta').innerHTML = '';
  document.getElementById('sidebarNav').innerHTML   = '';
  document.getElementById('stats').innerHTML        = '';

  const groups = { Server:[], Client:[], Embedded:[] };
  for (const p of INDEX) (groups[p.segment] || groups.Client).push(p);

  let html = '<div class="landing"><h2>Intel FSP Parameter Catalog</h2>';
  html += '<div class="lead">Browse firmware configuration parameters for all Intel FSP platforms. Parsed directly from official Intel FSP header files.</div>';

  for (const [seg, platforms] of Object.entries(groups)) {
    if (!platforms.length) continue;
    html += `<h3 style="color:var(--text-bright);margin:20px 0 10px;font-size:16px">${seg}</h3>`;
    html += '<div class="platform-grid">';
    for (const p of platforms.sort((a, b) => b.total_parameters - a.total_parameters)) {
      // Clicking a tile → pushState (user action creating a new history entry)
      html += `<div class="platform-tile" onclick="loadPlatform('${p.pkg_name}',null,true)">
        <div class="name">${esc(p.platform)}</div>
        <div class="proc">${esc(p.processor)}</div>
        <div class="meta">
          <span class="seg seg-${seg}">${seg}</span>
          <span class="param-count">${p.total_parameters.toLocaleString()} params</span>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

// ── Platform view ─────────────────────────────────────────────────────────────

async function loadPlatform(pkgName, scrollToField, push) {
  // push defaults to true when called from UI (tile click, dropdown)
  if (push === undefined) push = true;

  currentPlatform = INDEX.find(p => p.pkg_name === pkgName);
  if (!currentPlatform) return;

  // Set hash first — either platform-only or platform/field
  const hash = pkgName + (scrollToField ? '/' + scrollToField : '');
  setHash(hash, push);

  document.getElementById('platformSelect').value = pkgName;
  document.getElementById('platformMeta').innerHTML =
    `<span class="seg seg-${currentPlatform.segment}">${currentPlatform.segment}</span>` +
    ` FSP ${currentPlatform.fsp_spec_version} · ${currentPlatform.total_parameters} params`;

  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div><div>Loading parameters…</div></div>';

  try {
    const resp = await fetch(`data/${pkgName}.json`);
    platformData = await resp.json();
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="no-results"><div class="big">⚠</div><div>Could not load platform data.</div></div>';
    return;
  }

  activeCategory = 'all';
  searchQuery    = '';
  expandedCards.clear();
  document.getElementById('searchInput').value = '';

  // Pre-expand the target param so it renders open
  if (scrollToField) {
    const target = platformData.parameters.find(p => p.field_name === scrollToField);
    if (target) expandedCards.add(target.offset + target.field_name);
  }

  buildSidebar();
  renderContent();

  // After render: scroll to target and flash it
  if (scrollToField) {
    requestAnimationFrame(() => {
      const target = platformData.parameters.find(p => p.field_name === scrollToField);
      if (!target) return;
      const el = document.querySelector(`.param-card[data-id="${CSS.escape(target.offset + target.field_name)}"]`);
      if (!el) return;
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('flash');
      el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true });
    });
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

function buildPlatformSelect() {
  const sel = document.getElementById('platformSelect');
  const groups = { Server:[], Client:[], Embedded:[] };
  for (const p of INDEX) (groups[p.segment] || groups.Client).push(p);
  for (const [seg, platforms] of Object.entries(groups)) {
    if (!platforms.length) continue;
    const og = document.createElement('optgroup');
    og.label = seg;
    for (const p of platforms.sort((a, b) => a.processor.localeCompare(b.processor))) {
      const opt = document.createElement('option');
      opt.value = p.pkg_name;
      opt.textContent = `${p.processor} (${p.total_parameters})`;
      og.appendChild(opt);
    }
    sel.appendChild(og);
  }
}

function buildSidebar() {
  if (!currentPlatform) return;
  const cats   = currentPlatform.categories;
  const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
  let html = '<div class="nav-section">';
  html += `<div class="nav-item active" data-cat="all"><span>All Parameters</span><span class="count">${currentPlatform.total_parameters}</span></div>`;
  for (const [cat, count] of sorted) {
    html += `<div class="nav-item" data-cat="${esc(cat)}"><span>${esc(cat)}</span><span class="count">${count}</span></div>`;
  }
  html += '</div>';
  document.getElementById('sidebarNav').innerHTML = html;
}

// ── Render ────────────────────────────────────────────────────────────────────

function getFilteredParams() {
  if (!platformData) return [];
  let params = platformData.parameters;
  if (activeCategory !== 'all') params = params.filter(p => p.category === activeCategory);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    params = params.filter(p =>
      p.display_name.toLowerCase().includes(q) ||
      p.field_name.toLowerCase().includes(q)   ||
      (p.description && p.description.toLowerCase().includes(q))
    );
  }
  return params;
}

function renderContent() {
  const content = document.getElementById('content');
  const params  = getFilteredParams();
  if (!params.length) {
    content.innerHTML = '<div class="no-results"><div class="big">∅</div><div>No parameters match</div></div>';
    updateStats(); return;
  }
  const grouped = {};
  for (const p of params) {
    if (!grouped[p.category]) grouped[p.category] = [];
    grouped[p.category].push(p);
  }
  let html = '';
  for (const [cat, cp] of Object.entries(grouped).sort((a, b) => b[1].length - a[1].length)) {
    html += `<div class="category-header">${esc(cat)}<span class="badge">${cp.length}</span></div>`;
    for (const p of cp) {
      const id  = p.offset + p.field_name;
      const exp = expandedCards.has(id);
      html += `<div class="param-card${exp ? ' expanded' : ''}" data-id="${esc(id)}">
        <div class="param-header" onclick="toggleCard(this.closest('.param-card'))">
          <div class="param-title-area">
            <div class="param-name">${esc(p.display_name)}</div>
            <div class="param-field">${esc(p.field_name)}</div>
          </div>
          <div class="param-meta">
            ${p.default ? `<span class="param-default-chip">${esc(p.default)}</span>` : ''}
            <span class="param-type">${esc(p.c_type)}${p.array_size ? '[' + p.array_size + ']' : ''}</span>
            <span class="param-offset">${p.offset}</span>
            <span class="expand-icon">▶</span>
          </div>
        </div>
        <div class="param-body">
          <div class="param-desc">${esc(p.description)}</div>
          ${p.options && p.options.length ? renderOpts(p.options, p.default) : ''}
          <div class="phase-tag">${esc(p.phase)} · ${p.size_bytes}B</div>
        </div>
      </div>`;
    }
  }
  content.innerHTML = html;
  updateStats();
}

function renderOpts(opts, def) {
  let h = '<div class="param-options">';
  for (const o of opts) {
    const isDef = def && (o.label.toLowerCase().includes('default') || o.value === def);
    h += `<span class="option-chip${isDef ? ' is-default' : ''}">${esc(o.value)}: ${esc(o.label)}</span>`;
  }
  return h + '</div>';
}

function updateStats() {
  const el = document.getElementById('stats');
  if (!platformData) { el.innerHTML = ''; return; }
  const p = getFilteredParams();
  el.innerHTML = `<strong>${p.length}</strong> / ${platformData.total_parameters}`;
}

// ── Card toggle ───────────────────────────────────────────────────────────────

function toggleCard(cardEl) {
  const id        = cardEl.dataset.id;
  const isOpen    = expandedCards.has(id);

  if (isOpen) {
    expandedCards.delete(id);
    cardEl.classList.remove('expanded');
    // Collapsed: hash reverts to platform-only
    if (currentPlatform) setHash(currentPlatform.pkg_name, false);
  } else {
    expandedCards.add(id);
    cardEl.classList.add('expanded');
    // Expanded: update hash to platform/field_name
    if (platformData && currentPlatform) {
      const param = platformData.parameters.find(p => (p.offset + p.field_name) === id);
      if (param) setHash(currentPlatform.pkg_name + '/' + param.field_name, false);
    }
  }
}

// ── Events ────────────────────────────────────────────────────────────────────

function setupEvents() {
  // Category nav
  document.getElementById('sidebarNav').addEventListener('click', e => {
    const item = e.target.closest('.nav-item');
    if (!item) return;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    activeCategory = item.dataset.cat;
    expandedCards.clear();
    if (currentPlatform) setHash(currentPlatform.pkg_name, false);
    renderContent();
  });

  // Search
  let debounce;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      searchQuery = e.target.value.trim();
      expandedCards.clear();
      if (currentPlatform) setHash(currentPlatform.pkg_name, false);
      renderContent();
    }, 150);
  });

  // Sidebar toggle
  document.getElementById('toggleBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
  });

  // Dropdown — selecting a platform pushes state; selecting blank goes to landing
  document.getElementById('platformSelect').addEventListener('change', e => {
    if (e.target.value) loadPlatform(e.target.value, null, true);
    else                showLanding();
  });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
